<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">    
    <title>Spatial Sequence Editor - KMZ EMR Standard</title>

    <link rel="stylesheet" href="../transitions.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="/spatial-editor/style.css">
    <link rel="icon" type="image/svg+xml" sizes="64x64" href="../kmz-emr-standard/assets/favicon.svg">

</head>
<body>
   <div class="header" style="position: relative; justify-content: center;">
        
        <div style="flex: 1; display: flex; align-items: center;">
            <a href="../index.html" style="position: absolute; top: 16px; left: 24px; text-decoration: none; color: hsl(var(--foreground)); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 4px; transition: opacity 0.2s; z-index: 100;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
                
                <div style="display: flex; align-items: center; justify-content: center; width: 28px; height: 28px;">
                    <svg width="28" height="28" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill="currentColor" d="M30.4 12C31 12 31.2 12 31.5 12.1C31.6 12.2 31.8 12.4 31.9 12.5C32 12.8 32 13 32 13.6V31.5C32 31.7 32 31.8 32 31.9C32 31.9 31.9 32 31.9 32.1C31.9 32.2 31.8 32.3 31.7 32.4L18.5 51.3C18.3 51.6 18.2 51.7 18.1 51.8C18 51.9 17.9 51.9 17.8 52C17.6 52 17.5 52 17.2 52H13.6C13 52 12.8 52 12.5 51.9C12.4 51.8 12.2 51.6 12.1 51.5C12 51.2 12 51 12 50.4V13.6C12 13 12 12.8 12.1 12.5C12.2 12.4 12.4 12.2 12.5 12.1C12.8 12 13 12 13.6 12H30.4ZM33.6 52C33 52 32.8 52 32.5 51.9C32.4 51.8 32.2 51.6 32.1 51.5C32 51.2 32 51 32 50.4V32.5C32 32.3 32 32.2 32 32.1C32 32.1 32.1 32 32.1 31.9C32.1 31.8 32.2 31.7 32.3 31.6L45.5 12.7C45.7 12.4 45.8 12.3 45.9 12.2C46 12.1 46.1 12.1 46.2 12C46.4 12 46.5 12 46.8 12H50.4C51 12 51.2 12 51.5 12.1C51.6 12.2 51.8 12.4 51.9 12.5C52 12.8 52 13 52 13.6V50.4C52 51 52 51.2 51.9 51.5C51.8 51.6 51.6 51.8 51.5 51.9C51.2 52 51 52 50.4 52H33.6Z"/>
                    </svg>
                </div>

                Naradevane
            </a>
        </div>

        <h1 style="margin: 0; white-space: nowrap;">Spatial Sequence Editor</h1>
        
        <div style="flex: 1; display: flex; justify-content: flex-end; gap: 10px;">
            <a href="../kmz-emr-standard/index.html" style="display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); background-color: transparent; text-decoration: none; transition: all 0.2s;" onmouseover="this.style.borderColor='var(--text-muted)'; this.style.color='var(--text-white)'; this.style.backgroundColor='var(--hover-bg)'" onmouseout="this.style.borderColor='var(--border)'; this.style.color='var(--text-muted)'; this.style.backgroundColor='transparent'" title="Back to KMZ EMR">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="7" y1="17" x2="17" y2="7"></line>
                    <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
            </a>
        </div>

    </div>

    <div class="container">
        <div class="panel left-panel">
            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept=".kml,.kmz" hidden>
                <button id="uploadBtn" class="btn btn-primary">Upload File</button>
                <span id="fileName" class="text-muted">No file selected</span>
            </div>
            
            <div class="scroll-container">
                <details class="section-card" id="step1Card" open>
                    <summary>
                        <h3>1. Select Folders</h3>
                        <button id="btnUnselectAll" class="btn btn-outline btn-small hidden" style="margin-left: auto;">☐ Unselect All</button>
                    </summary>
                    <div class="section-content">
                        <div id="folderList" class="checkbox-group large-box">
                            <span class="text-muted">Upload file to see folders...</span>
                        </div>
                    </div>
                </details>

                <details class="section-card">
                    <summary><h3>2. Rearrange Items</h3></summary>
                    <div class="section-content">
                        <div class="toolbar">
                            <button id="btnSortSpatial" class="btn btn-secondary">Sort North-South</button>
                            <button id="btnSortAlpha" class="btn btn-secondary">Sort A-Z</button>
                        </div>
                        <div id="itemList" class="sortable-list full-list">
                            <span class="text-muted">Select folders first...</span>
                        </div>
                        <div class="item-stats text-muted" style="margin-top: 10px;">Selected: <span id="selectedCount" class="text-white">0</span> items</div>
                    </div>
                </details>

                <details class="section-card" open>
                    <summary><h3>3. Rename Rules</h3></summary>
                    <div class="section-content">
                        <div class="rule-header">
                            <span>Prefix</span>
                            <span>Start</span>
                            <span>Count</span>
                            <span>Suffix (Opt)</span>
                            <span></span>
                        </div>
                        <div id="rulesContainer">
                            </div>
                        <button id="addRuleBtn" class="btn btn-outline text-blue" style="width: 100%; margin-top: 8px;">+ Add New Rule</button>
                        
                        <div class="options-group">
                            <div class="input-group">
                                <label style="margin-bottom: 8px; display: block; color: var(--text-muted); font-size: 12px;">Number Padding:</label>
                                <div class="segmented-control">
                                    <input type="radio" id="pad1" name="padding" value="1">
                                    <label for="pad1">1</label>
                                    
                                    <input type="radio" id="pad2" name="padding" value="2">
                                    <label for="pad2">01</label>
                                    
                                    <input type="radio" id="pad3" name="padding" value="3" checked>
                                    <label for="pad3">001</label>
                                </div>
                            </div>
                            <div class="input-group checkbox-align">
                                <input type="checkbox" id="delDescCheck"> 
                                <label for="delDescCheck">Delete Descriptions</label>
                            </div>
                        </div>
                    </div>
                </details>

                <div class="action-section">
                    <button id="previewBtn" class="btn btn-secondary">Refresh Preview</button>
                    <button id="processBtn" class="btn btn-success" disabled>Process & Download</button>
                </div>
            </div>
        </div>

        <div class="panel right-panel" id="mapPanel">
            <div id="map" class="map-container"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js" defer></script>
    <script src="/spatial-editor/app.js"></script>
</body>
</html>
